<!doctype html>
<html lang="en">
  <head>
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CivicSync - Book Your Appointment</title>
    <link rel="stylesheet" href="booking.css" />
  </head>
  <body class="booking-bg-image">
    <header class="site-header transparent-header">
      <div class="logo-container">
        <img
          src="Images/civicsync-logo.png"
          alt="CivicSync Logo"
          class="logo-icon"
        />
        <span class="logo-text">CivicSync</span>
      </div>
      <nav class="main-nav">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
      <div class="header-action">
        <a href="register.html" class="btn-outline">Get Started</a>
      </div>
    </header>

    <main class="booking-main-content">
      <section class="page-headers">
        <h1 class="page-title">Book Your Appointment</h1>
      </section>

      <form
        id="booking-form"
        action="#"
        method="POST"
        class="booking-form-container"
      >
        <div class="location-selector-wrapper">
          <span class="icon-map-marker" aria-hidden="true"></span>
          <label for="location" class="visually-hidden">Select Location</label>
          <select
            id="location"
            name="location"
            class="location-dropdown"
            required
          >
            <option value="" disabled selected>Select Location:</option>
            <option value="sandton">Sandton Home Affairs</option>
            <option value="randburg">Randburg Home Affairs</option>
            <option value="jhb-central">Johannesburg Central</option>
          </select>
          <span class="icon-chevron-down" aria-hidden="true"></span>
        </div>

        <div class="booking-grid">
          <div class="calendar-widget">
            <div class="calendar-header">
              <button
                type="button"
                class="btn-cal-nav icon-arrow-left"
                aria-label="Previous Month"
              ></button>
              <h2 class="calendar-month-year">March 2024</h2>
              <button
                type="button"
                class="btn-cal-nav icon-arrow-right"
                aria-label="Next Month"
              ></button>
            </div>

            <div class="calendar-days-header">
              <span>Sun</span>
              <span>Mon</span>
              <span>Tue</span>
              <span>Wed</span>
              <span>Thu</span>
              <span>Fri</span>
              <span>Sat</span>
            </div>

            <div class="calendar-dates-grid">
              <span class="date empty"></span>
              <span class="date empty"></span>
              <span class="date empty"></span>
              <span class="date empty"></span>
              <button type="button" class="date">1</button>
              <button type="button" class="date">2</button>
              <button type="button" class="date">3</button>
              <button type="button" class="date">4</button>
              <button type="button" class="date">5</button>
              <button type="button" class="date">6</button>
              <button type="button" class="date">23</button>
              <button type="button" class="date">24</button>
              <button type="button" class="date selected" aria-current="date">
                25
              </button>
              <button type="button" class="date">26</button>
              <button type="button" class="date">27</button>
              <button type="button" class="date">28</button>
              <button type="button" class="date">29</button>
              <button type="button" class="date">30</button>
            </div>
          </div>

          <div class="time-slots-widget">
            <h3 class="time-slots-title">Select a Time Slot:</h3>

            <div class="time-options">
              <div class="time-slot">
                <input
                  type="radio"
                  id="time-1000"
                  name="timeSlot"
                  value="10:00 AM"
                  class="visually-hidden"
                  required
                />
                <label for="time-1000" class="time-slot-label">10:00 AM</label>
              </div>

              <div class="time-slot">
                <input
                  type="radio"
                  id="time-1030"
                  name="timeSlot"
                  value="10:30 AM"
                  class="visually-hidden"
                />
                <label for="time-1030" class="time-slot-label">10:30 AM</label>
              </div>

              <div class="time-slot">
                <input
                  type="radio"
                  id="time-1100"
                  name="timeSlot"
                  value="11:00 AM"
                  class="visually-hidden"
                />
                <label for="time-1100" class="time-slot-label">11:00 AM</label>
              </div>
            </div>

            <button
              type="submit"
              class="btn-primary btn-confirm"
              id="btn-confirm-booking"
            >
              Confirm Booking
            </button>
          </div>
        </div>
      </form>
    </main>
    <script src="booking.js"></script>
  </body>
</html>
