<!doctype html>
<html lang="en">
  <head>
    <script src="upload.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="upload.css"/>
    <title>CivicSync - Upload Documents</title>
  </head>
  <body class="upload-bg-image">
    <header class="site-header transparent-header">
      <div class="logo-container">
        <img
          src="assets/civicsync-logo.svg"
          alt="CivicSync Logo"
          class="logo-icon"
        />
        <span class="logo-text">CivicSync</span>
      </div>
      <nav class="main-nav">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
      <div class="header-action">
        <a href="register.html" class="btn-outline">Get Started</a>
      </div>
    </header>

    <main class="upload-main-content">
      <section class="page-headers">
        <h1 class="page-title">Upload Your Documents</h1>
        <p class="page-subtitle">
          Securely upload your documents for pre-verification
        </p>
      </section>

      <section class="upload-card">
        <div class="drag-drop-zone" id="drop-zone">
          <div class="cloud-icon-wrapper">
            <span class="icon-cloud-upload" aria-hidden="true"></span>
          </div>
          <p class="drag-drop-text">Drag & drop your file here</p>

          <input
            type="file"
            id="file-upload"
            name="file-upload"
            class="visually-hidden"
            multiple
          />
          <label for="file-upload" class="btn-browse">Browse files</label>
        </div>

        <ul class="document-list">
          <li class="doc-item">
            <div class="doc-info">
              <span class="icon-file-doc" aria-hidden="true"></span>
              <span class="doc-name">Document</span>
            </div>
            <div class="doc-status">
              <span class="status-circle" aria-hidden="true"></span>
              <span class="status-text">Uploaded</span>
            </div>
          </li>

          <li class="doc-item">
            <div class="doc-info">
              <span class="icon-file-doc" aria-hidden="true"></span>
              <span class="doc-name">Proof of Residence</span>
            </div>
            <div class="doc-status">
              <span class="status-circle" aria-hidden="true"></span>
              <span class="status-text">Uploaded</span>
            </div>
          </li>

          <li class="doc-item">
            <div class="doc-info">
              <span class="icon-file-doc" aria-hidden="true"></span>
              <span class="doc-name">Additional Documents</span>
            </div>
            <div class="doc-status">
              <span class="status-circle" aria-hidden="true"></span>
              <span class="status-text">Uploaded</span>
            </div>
          </li>
        </ul>
      </section>

      <section class="verify-action-section">
        <button
          type="button"
          class="btn-primary btn-large"
          id="btn-verify-documents"
        >
          Verify Documents
        </button>
      </section>
    </main>
    <script src="upload.js"></script>
  </body>
</html>
